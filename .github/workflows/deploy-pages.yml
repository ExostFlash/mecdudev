name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npx ng build --configuration production --base-href ./

      - name: Prepare Pages artifact
        run: |
          if [ -d "dist/angular/browser" ]; then
            cp -r dist/angular/browser ./pages-dist
          elif [ -d "dist/angular" ]; then
            cp -r dist/angular ./pages-dist
          else
            echo "Build output not found"
            exit 1
          fi

          # SPA fallback for direct navigation/refresh on GitHub Pages routes.
          cp ./pages-dist/index.html ./pages-dist/404.html

          # Custom domain for GitHub Pages (apex domain).
          echo "mecdu.dev" > ./pages-dist/CNAME

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
