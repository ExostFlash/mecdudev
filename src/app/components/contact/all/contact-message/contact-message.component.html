<div class="content">
    <div class="text">
        <h2>Contactez-nous</h2>
        <div class="line" style="width: 34%;"></div>
        <form id="contact-form">
            <div class="form-group">
                <label for="name">
                    <i class="bi bi-person-vcard bi-2X bi-marg"></i>
                    <input type="text" id="name" name="name" placeholder="Nom et prénom" required>
                    <span class="focus-border"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="email">
                    <i class="bi bi-envelope-at bi-2X bi-marg"></i>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                    <span class="focus-border"></span>
                </label>
            </div>
            <div class="form-group">
                <label for="message">
                    <i class="bi bi-chat-dots bi-2X bi-marg"></i>
                    <textarea id="message" name="message" rows="4" placeholder="Message" required></textarea>
                    <span class="focus-border"></span>
                </label>
            </div>
            <button id="contactButton" type="submit">Envoyer</button>
        </form>
    </div>
    <div class="image">
        <img src="/assets/images/section/contact.png" alt="Contact" loading="lazy">
    </div>
</div>
