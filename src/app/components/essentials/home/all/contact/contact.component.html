<div class="content">
        <div class="text">
            <h2>Contactez-nous</h2>
            <div class="line" style="width: 34%;"></div>
            <form id="contact-form">
                <div class="form-group">
                    <label for="name">
                        <img src="/assets/images/icons/user.png" alt="Nom" loading="lazy">
                        <input type="text" id="name" name="name" placeholder="Nom et prénom" required>
                        <span class="focus-border"></span>
                    </label>
                </div>
                <div class="form-group">
                    <label for="email">
                        <img src="/assets/images/icons/email.png" alt="Email" loading="lazy">
                        <input type="email" id="email" name="email" placeholder="Email" required>
                        <span class="focus-border"></span>
                    </label>
                </div>
                <div class="form-group">
                    <label for="message">
                        <img src="/assets/images/icons/message.png" alt="Message" loading="lazy">
                        <textarea id="message" name="message" rows="4" placeholder="Message" required></textarea>
                        <span class="focus-border"></span>
                    </label>
                </div>
                <button id="contactButton" type="submit">Envoyer</button>
            </form>
        </div>
        <div class="image">
            <img src="/assets/images/section/contact.png" alt="Contact" loading="lazy">
        </div>
    </div>
